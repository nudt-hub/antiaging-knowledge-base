name: SEO Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # 每周一运行
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    continue-on-error: true  # 失败不阻止其他工作流
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      
      - name: Build
        run: hugo -D --minify
      
      - name: Check if site is accessible
        id: check-site
        run: |
          echo "检查网站是否可访问..."
          if curl -s -f --max-time 10 "https://muwangdao.github.io/antiaging-knowledge-base/" > /dev/null 2>&1; then
            echo "site_accessible=true" >> $GITHUB_OUTPUT
            echo "✅ 网站可访问"
          else
            echo "site_accessible=false" >> $GITHUB_OUTPUT
            echo "⚠️ 网站无法访问（可能是 GitHub Pages 未部署成功）"
            echo "跳过 Lighthouse 测试，但不报错"
            exit 0
          fi
      
      - name: Run Lighthouse CI
        if: steps.check-site.outputs.site_accessible == 'true'
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            /
            /basics/
            /interventions/
            /research/
            /recent/
            /metabolism/
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Upload Lighthouse Report
        if: steps.check-site.outputs.site_accessible == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
