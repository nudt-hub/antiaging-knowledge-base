name: Sync HAGR Database

on:
  schedule:
    - cron: '0 2 1 1,4,7,10 *'  # 每季度第一个月的 1 号凌晨 2:00 UTC（北京时间 10:00）
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-hagr:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run sync script
        id: sync
        run: |
          python scripts/sync-hagr.py
          echo "sync_completed=true" >> $GITHUB_OUTPUT
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet content/aging-genes.md || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/aging-genes.md data/
          git commit -m "docs: 自动同步 HAGR 数据库状态 $(date +%Y-%m-%d)"
          git push
      
      - name: Create issue if sync fails
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "⚠️ HAGR 数据库同步失败"
          content-filepath: data/sync-error.md
          labels: automated, data-sync, hagr
      
      - name: Upload sync report
        uses: actions/upload-artifact@v4
        with:
          name: sync-report
          path: data/
