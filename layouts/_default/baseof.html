<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --text: #2d3748;
            --text-light: #718096;
            --bg: #ffffff;
            --bg-secondary: #f7fafc;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; color: var(--text); background: var(--bg); }
    </style>
</head>
<body>
    {{ if .Site.Params.passwordProtection }}
    <div id="site-login" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(102, 126, 234, 0.95) 0%, rgba(118, 75, 162, 0.95) 100%); z-index: 9999; align-items: center; justify-content: center;">
        <div style="max-width: 400px; width: 90%; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 24px;">🔐 网站访问验证</h2>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 30px; font-size: 14px;">本网站为私有知识库，请输入访问密码</p>
            <form onsubmit="verifySitePassword(event)" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="password" id="site-password-input" placeholder="请输入密码" style="padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; outline: none;">
                <button type="submit" style="padding: 12px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">验证并访问</button>
            </form>
            <div id="site-error-message" style="display: none; margin-top: 15px; padding: 12px; background: #fed7d7; border-left: 4px solid #f56565; border-radius: 6px; color: #742a2a; font-size: 14px;">❌ 密码错误，请重新输入</div>
            <div style="margin-top: 25px; padding-top: 25px; border-top: 1px solid var(--border); text-align: center;">
                <p style="color: var(--text-light); font-size: 13px; margin-bottom: 12px;">需要访问权限？</p>
                <a href="/access-request/" style="display: inline-block; padding: 10px 20px; background: var(--bg-secondary); color: var(--primary); border-radius: 6px; text-decoration: none; font-weight: 500; font-size: 14px;">📧 申请访问权限</a>
            </div>
        </div>
    </div>
    {{ end }}

    <div id="site-content" style="{{ if .Site.Params.passwordProtection }}filter: blur(10px); pointer-events: none;{{ end }}">
        {{ block "main" . }}
    </div>

    {{ if .Site.Params.passwordProtection }}
    <script>
    function verifySitePassword(event) {
        event.preventDefault();
        const input = document.getElementById('site-password-input').value;
        const errorMessage = document.getElementById('site-error-message');
        const correctPassword = 'AntiAging2026';
        if (input === correctPassword) {
            sessionStorage.setItem('siteAccess', 'granted');
            document.getElementById('site-login').style.display = 'none';
            document.getElementById('site-content').style.filter = 'none';
            document.getElementById('site-content').style.pointerEvents = 'auto';
        } else {
            errorMessage.style.display = 'block';
            document.getElementById('site-password-input').value = '';
            document.getElementById('site-password-input').focus();
        }
    }
    window.addEventListener('DOMContentLoaded', function() {
        const hasAccess = sessionStorage.getItem('siteAccess');
        if (hasAccess === 'granted') {
            document.getElementById('site-login').style.display = 'none';
            document.getElementById('site-content').style.filter = 'none';
            document.getElementById('site-content').style.pointerEvents = 'auto';
        } else {
            document.getElementById('site-login').style.display = 'flex';
        }
    });
    </script>
    {{ end }}
</body>
</html>
