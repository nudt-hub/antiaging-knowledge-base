{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
    <h1 style="color: var(--text); font-size: 2em; margin-bottom: 30px;">{{ .Title }}</h1>
    {{ if .Content }}
    <div class="content" style="line-height: 1.8; margin-bottom: 40px;">
        {{ .Content }}
    </div>
    {{ end }}
    {{ if .Pages }}
    <div style="display: grid; gap: 20px;">
        {{ range .Pages }}
        <div style="padding: 20px; background: var(--bg-secondary); border-radius: 8px; border-left: 4px solid var(--primary);">
            <h2 style="margin: 0 0 10px 0; font-size: 1.3em;">
                <a href="{{ .Permalink }}" style="color: var(--primary); text-decoration: none;">{{ .Title }}</a>
            </h2>
            {{ if .Description }}
            <p style="color: var(--text-light); margin: 0;">{{ .Description }}</p>
            {{ end }}
        </div>
        {{ end }}
    </div>
    {{ end }}
</main>
{{ end }}
