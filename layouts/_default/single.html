{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
    <article>
        <h1 style="color: var(--text); font-size: 2em; margin-bottom: 20px;">{{ .Title }}</h1>
        {{ if .Params.description }}
        <p style="color: var(--text-light); font-size: 1.1em; margin-bottom: 30px;">{{ .Params.description }}</p>
        {{ end }}
        <div class="content" style="line-height: 1.8;">
            {{ .Content }}
        </div>
    </article>
</main>
{{ end }}
