<header>
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
</header>

<nav>
    <a href="{{ "" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>🏠 首页</a>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if eq $.Page.Title .Name }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
    
    {{ if .Site.Params.features.search }}
    <div class="search-box">
        <input type="search" placeholder="🔍 搜索全站..." id="search-input">
        <button class="search-btn" onclick="triggerSearch()" title="搜索">🔍</button>
    </div>
    {{ end }}
</nav>

<script>
function triggerSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (query.length < 2) {
        alert('请输入至少 2 个字符进行搜索');
        document.getElementById('search-input').focus();
        return;
    }
    
    if (typeof showModal === 'function') {
        showModal();
        displayResults(query);
    }
}

// 支持回车键触发搜索
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    if (searchInput) {
        searchInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                triggerSearch();
            }
        });
    }
});
</script>
