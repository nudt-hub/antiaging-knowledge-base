<nav role="navigation" aria-label="主导航">
    <a href="{{ "/" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>🏠 首页</a>
    {{- if .Site.Menus.main }}
    {{- range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if eq $.Page.Title .Name }} class="active"{{ end }}>{{ .Name }}</a>
    {{- end }}
    {{- end }}
    
    {{- if .Site.Params.features.search }}
    <div class="search-box">
        <input type="search" placeholder="🔍 搜索全站..." id="search-input">
        <button class="search-btn" onclick="triggerSearch()" title="搜索">🔍</button>
    </div>
    {{- end }}
</nav>

<script>
function triggerSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (query.length < 2) {
        alert('请输入至少 2 个字符进行搜索');
        document.getElementById('search-input').focus();
        return;
    }
    alert('搜索功能开发中...');
}
</script>
